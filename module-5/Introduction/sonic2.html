<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <title>Sonic Example</title>
    <style>
      .prevent-select {
        -webkit-user-select: none; /* Safari */
        -ms-user-select: none; /* IE 10 and IE 11 */
        user-select: none; /* Standard syntax */
      }
    </style>
    <!-- Import map: map the bare specifier "three" to the local module build. -->
    <script type="importmap">
      {
        "imports": {
          "libSprite": "../../common/script/libSprite.mjs",
          "lib2d": "../../common/script/lib2d.mjs"
        }
      }
    </script>
  </head>
  <body class="prevent-select">
    <canvas id="cvs" style="background-color: antiquewhite" width="1024" height="512"></canvas>
  </body>
  <script type="module" defer>
    // Import libraries
      import { TSpriteCanvas, TSprite } from "libSprite";


  // prettier-ignore
  const SpriteInfoList = {
    sonic1: { x: 0, y:   0, width: 102, height: 125, count: 6},
    sonic2: { x: 0, y: 125, width: 102, height: 125, count: 9},
    sonic3: { x: 0, y: 250, width: 102, height: 125, count: 9},
    sonic4: { x: 0, y: 375, width: 102, height:  75, count: 7},
    sonic5: { x: 0, y: 450, width: 100, height: 130, count: 5},
    sonic6: { x: 0, y: 575, width: 102, height: 125, count: 3},
    sonic7: { x: 0, y: 700, width: 102, height: 125, count: 2},
    sonic8: { x: 0, y: 825, width: 102, height: 125, count: 2},
    sonic9: { x: 0, y: 950, width: 102, height: 125, count: 4}
  }

    // Global variables
    const cvs = document.getElementById("cvs");
    const ctx = cvs.getContext("2d");
    const spCvs = new TSpriteCanvas(cvs);
    const hero1 = new TSprite(spCvs, SpriteInfoList.sonic2, 0, 0); 
    const hero2 = new TSprite(spCvs, SpriteInfoList.sonic4, 200, 150);
    const hero3 = new TSprite(spCvs, SpriteInfoList.sonic1, 0, 300);
    // Functions

    function drawCanvas(){
      // This is a high performance function
      // Do not calculate any heavy calculations here

      hero1.draw();
      hero2.draw();
      hero3.draw();
    }

    let dir1 = 1; // 1 = right, -1 = left
    let dir2 = 1;
    function animate(){
      hero1.x += 10 *dir1; // Change value to increase or decrease speed
      if((hero1.x > cvs.width - hero1.width ) || ( hero1.x + hero1.width < 0 && dir1 < 0)){
        dir1 *= -1;
        hero1.flipHorizontal();

      }
    }
      hero3.x += 10 * dir1;

    function animate2(){
      hero2.x += 15 *dir2; // Change value to increase or decrease speed
      if((hero2.x > cvs.width - hero2.width ) || (hero2.x + hero2.width < 0 && dir2 < 0)){
        dir2 *= -1;
        hero2.flipHorizontal();
      }

    }
    function animate3(){
      hero3.x
      if((hero3.x > cvs.width - hero3.width ) || (hero3.x + hero3.width < 0 && dir1 < 0)){
      }
    }

    function sheetLoaded(){
      console.log("Sheet loaded");
      spCvs.showFramerate = true;
      spCvs.onDraw = drawCanvas;
      hero1.animationSpeed = 20;
      hero1.rotation = 0;
      hero2.animationSpeed = 10;
      hero2.rotation = 0;
      hero2.hidden = false;
      hero3.animationSpeed = 15;
      hero3.rotation = 0;
      hero3.hidden = false;
      //hero.flipHorizontal();

      //start Animation
      setInterval(animate, 20);
      setInterval(animate2, 20);
      setInterval(animate3, 20);
    }

document.addEventListener("keydown", onKeyDown);
let hero3Facing = 1; // 1 = facing right, -1 = facing left

function onKeyDown(aEvent){
  console.log("keypress", aEvent.code);
  switch(aEvent.code){
    case "ArrowUp":
      hero3.y -= 10;
      break;
    case "ArrowDown":
      hero3.y += 10;
      break;
    case "ArrowLeft":
      hero3.x -= 10
      if (hero3Facing !== -1){
        hero3.flipHorizontal();
        hero3Facing = -1;
      }
      break;
    case "ArrowRight":
      hero3.x += 10;
      if (hero3Facing !== 1){
        hero3.flipHorizontal();
        hero3Facing = 1;
      }
      break;
  }
}

    // Main application
    spCvs.loadSpriteImage("sonic_sprite_sheet.png", sheetLoaded);

  </script>
</html>
